before:
  hooks:
    - go mod download
builds:
  - env:
      - CGO_ENABLED=0
    id: coredns
    main: ./cmd/coredns.go
    binary: coredns
    goos:
      - linux
    goarch:
      - amd64
      - arm64
dockers:
- use: buildx
- image_templates:
  - "ghcr.io/k8gb-io/k8s_crd:{{ .Tag }}-amd64"
  dockerfile: Dockerfile
  build_flag_templates:
  - "--platform=linux/amd64"
- image_templates:
  - "ghcr.io/k8gb-io/k8s_crd:{{ .Tag }}-arm64"
  goarch: arm64
  dockerfile: Dockerfile
  build_flag_templates:
  - "--platform=linux/arm64"
docker_manifests:
- name_template: ghcr.io/k8gb-io/k8s_crd:{{ .Tag }}
  image_templates:
  - ghcr.io/k8gb-io/k8s_crd:{{ .Tag }}-amd64
  - ghcr.io/k8gb-io/k8s_crd:{{ .Tag }}-arm64
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
changelog:
  filters:
    exclude:
      - '^docs:'
      - '^test:'
